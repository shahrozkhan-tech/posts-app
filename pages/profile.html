<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="profile.css" />
  </head>
  <body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="profile-card">
      <div class="profile-header">
        <div class="avatar-container">
          <div class="avatar-wrapper">
            <img
              id="userAvatar"
              src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
              alt="Profile"
            />
          </div>
          <input
            type="file"
            id="avatarInput"
            accept="image/*"
            style="display: none"
          />
          <button
            type="button"
            class="upload-btn"
            onclick="document.getElementById('avatarInput').click()"
          >
            <i class="fas fa-camera"></i>
          </button>
        </div>
        <h1>Edit Profile</h1>
        <p>Update your personal account information</p>
      </div>

      <form id="editProfileForm">
        <div class="form-group">
          <label class="form-label"
            ><i class="fas fa-user"></i> Full Name</label
          >
          <input
            type="text"
            id="editNameInp"
            class="input-field"
            placeholder="Enter your name"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label"
            ><i class="fas fa-envelope"></i> Email Address</label
          >
          <input type="email" id="userEmail" class="input-field" disabled />
        </div>

        <div class="form-group">
          <label class="form-label"
            ><i class="fas fa-phone"></i> Phone Number</label
          >
          <input
            type="text"
            id="editPhoneInp"
            class="input-field"
            placeholder="Enter phone number"
            required
          />
        </div>

        <div class="action-buttons">
          <button type="submit" id="saveProfileBtn" class="btn save-btn">
            <i class="fas fa-check-circle"></i> Save Changes
          </button>
          <button
            type="button"
            onclick="window.history.back()"
            class="btn back-btn"
          >
            <i class="fas fa-arrow-left"></i> Go Back
          </button>
        </div>
      </form>
    </div>

    <!-- Image Preview Modal -->
    <div id="imageModal">
      <span id="closeModal">&times;</span>
      <img id="modalImage" />
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="profile.js"></script>
  </body>
</html>
